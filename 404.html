<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Ziggy Silver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-md);
    }
    .error-code {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(6rem, 15vw, 12rem);
      color: var(--colour-red);
      opacity: 0.3;
      line-height: 1;
      margin-bottom: var(--space-sm);
    }
    .error-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--colour-gold);
      margin-bottom: var(--space-sm);
    }
    .error-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--colour-text-muted);
      margin-bottom: var(--space-lg);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <p class="error-code">404</p>
    <h1 class="error-title">This page doesn't exist</h1>
    <p class="error-text">Even the darkest stories have to start somewhere.</p>
    <a href="index.html" class="btn btn-primary">Back to Home</a>
  </div>
</body>
</html>
